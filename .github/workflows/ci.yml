name: Java CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-inspect-deploy:
    runs-on: ubuntu-latest
    
    # Izin diperlukan untuk menulis ke GitHub Packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Wajib untuk analisis histori SonarCloud

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github # Untuk otentikasi deploy
          settings-path: ${{ github.workspace }}

      # 1. Continuous Integration & Testing
      - name: Build and Test
        run: mvn clean verify --batch-mode

      # 2. Continuous Inspection
      - name: SonarCloud Scan
        run: |
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar --batch-mode \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.projectKey=aditya-0122_PrepPhase_MKEPL \
          -Dsonar.organization=aditya-0122 \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # Memastikan action menunggu proses di SonarCloud server selesai
          scanMetadataReportFile: target/sonar/report-task.txt

      # 3. Continuous Deployment
      - name: Publish to GitHub Packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml -DskipTests