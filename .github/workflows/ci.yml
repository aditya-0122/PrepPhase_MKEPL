name: Java CI

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Continuous Integration
      - name: Compile Project
        run: mvn clean compile

      # Continuous Testing
      - name: Run Tests
        run: mvn test
