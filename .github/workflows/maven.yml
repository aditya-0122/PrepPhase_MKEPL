name: Java CI Pipeline & Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  ci-build-sonar-publish:
    name: Build, Analyze, and Publish
    runs-on: ubuntu-latest
    
    # Diperlukan agar GitHub Actions memiliki akses mengunggah ke GitHub Packages
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        server-id: github # Cocok dengan <id> di tag <repository> pada pom.xml
        settings-path: ${{ github.workspace }} 

    - name: Build and SonarCloud Scan
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: >
        mvn clean verify sonar:sonar -DskipTests
        -Dsonar.projectKey=aditya-0122_PrepPhase_MKEPL 
        -Dsonar.organization=aditya-0122 
        -Dsonar.host.url=https://sonarcloud.io

    - name: Publish to GitHub Packages
      if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Menggunakan token otomatis GitHub untuk otentikasi saat deploy
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml -DskipTests